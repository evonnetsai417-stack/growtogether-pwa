<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>一起長大 · 兒童電子寵物</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#FFF4DD" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="一起長大" />
<link rel="apple-touch-icon" href="icon.svg" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #FFF4DD; font-family: "Noto Sans TC", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; }
  #root { width: 100%; height: 100%; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { transform: translateY(-60px) scale(1); opacity: 0; }
  }
  @keyframes heartFloat {
    0% { transform: translate(0, 0) scale(0); opacity: 0; }
    20% { opacity: 1; transform: translate(0, -10px) scale(1.2); }
    100% { transform: translate(0, -80px) scale(0.6); opacity: 0; }
  }
  @keyframes pokeBounce {
    0%, 100% { transform: translateX(calc(-50% + var(--pet-x, 0px))) scale(1); }
    30% { transform: translateX(calc(-50% + var(--pet-x, 0px))) scale(1.1) translateY(-10px); }
    60% { transform: translateX(calc(-50% + var(--pet-x, 0px))) scale(0.96) translateY(2px); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes toastIn {
    0% { transform: translateX(-50%) translateY(-30px); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  @keyframes toastOut {
    0% { transform: translateX(-50%) translateY(0); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-30px); opacity: 0; }
  }
  @keyframes butterfly {
    0% { transform: translateY(-3px) scaleX(1); }
    100% { transform: translateY(3px) scaleX(0.9); }
  }
  @keyframes gentleSpin {
    from { transform: rotate(0deg); } to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="animals.jsx"></script>
<script type="text/babel" src="animals2.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="minigames.jsx"></script>
<script type="text/babel" src="players.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(() => {});
    });
  }
</script>
</body>
</html>
